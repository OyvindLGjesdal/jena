name: Apache Jena CI
on: workflow_dispatch
jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v2
   
    - name: check disk before java
      run: df -h

    - name: Set up JDK 11
      uses: actions/setup-java@v1
      with:
        java-version: '11'

    - name: copy checked out dir to /c/jena for windows-latest
      run: bash -c "cp -r /d/a/jena/jena /c/jena"
      runs-on: windows-latest

    - name: Build with Maven for windows-latest
      run: bash -c "cd /c/jena && mvn -B verify --file pom.xml
      runs_on: windows_latest

    - name: Build with Maven for macos-latest and ubuntu-latest
      run: mvn -B verify --file pom.xml
      runs_on: [macos-latest, ubuntu-latest]
