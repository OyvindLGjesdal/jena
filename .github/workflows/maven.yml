name: Apache Jena CI
on: workflow_dispatch
jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v2
   
    - name: Set up JDK 11
      uses: actions/setup-java@v1
      with:
        java-version: '11'

    - name: copy checked out dir to /c/jena for windows-latest
      run: bash -c "cp -r /d/a/jena/jena /c/jena"
      if: matrix.os == 'windows-latest'

    - name: Build with Maven for windows-latest
      run: bash -c "mvn -B verify --file pom.xml"
      if: matrix.os == 'windows-latest'
      working-directory: c:\jena

    - name: Build with Maven for macos-latest and ubuntu-latest
      run: mvn -B verify --file pom.xml
      if: matrix.os != 'windows-latest'
