name: Apache Jena CI

on:
  push:
    branches: [ main, windows-disk-full ]
#  pull_request:
#    branches: [ main ]

jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest ]

    steps:
    - uses: actions/checkout@v2
   
    - name: check disk before java
      run: df -h

    - name: Set up JDK 11
      uses: actions/setup-java@v1
      with:
        java-version: '11'

    - name: check disk after java
      run: bash -c "df -h && mkdir /c/build"

    - name: Build with Maven
      run: bash -c "mkdir /c/output && mvn -B -Dmaven.source.skip=true -Dmaven.javadoc.skip=true -Dproject.build.outputDirectory=/c/output -Dsource.skip verify --file /d/a/jena/jena/pom.xml"
      working-directory: c:\build
