name: Apache Jena CI

on:
  push:
    branches: [ main, windows-disk-full ]
#  pull_request:
#    branches: [ main ]

jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest ]

    steps:
    - uses: actions/checkout@v2
   
    - name: check disk before java
      run: df -h

    - name: check maven version
      run: mvn --version

    - name: set env variable for JAVA_HOME
      run: |
	echo "JAVA_HOME=$JAVA_HOME_11_X64" >> $GITHUB_ENV
     
    - name: check maven version
      run: mvn --version && java --version

#    - name: Set up JDK 11
#      uses: actions/setup-java@v1
#      with:
#        java-version: '11'

    - name: check disk after java
      run: fsutil fsinfo drives

    - name: Build with Maven
      run: mvn -B verify --file pom.xml
