name: Apache Jena CI
on: workflow_dispatch
jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: windows-latest
            mvn-command: bash -c "cd /c/jena && mvn -B verify --file pom.xml
          - os: [ubuntu-latest, macos-latest]
            mvn-command: mvn -B verify --file pom.xml

    steps:
    - uses: actions/checkout@v2
   
    - name: check disk before java
      run: df -h

    - name: Set up JDK 11
      uses: actions/setup-java@v1
      with:
        java-version: '11'

    - name: copy checked out dir to /c/jena
      run: bash -c "cp -r /d/a/jena/jena /c/jena"
      if: matrix.os == 'windows-latest'

    - name: Build with Maven
      run: ${{ matrix.mvn-command }}
